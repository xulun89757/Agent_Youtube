name: YouTube Agent

on:
  schedule:
    # 每天 UTC 01:00 = 北京时间 09:00
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Log workflow info
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Trigger: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Start time (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log last video record
        run: |
          if [ -f last_video.txt ] && [ -s last_video.txt ]; then
            echo "上次记录的视频 ID: $(cat last_video.txt)"
          else
            echo "尚无上次视频记录"
          fi

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Log Node.js version
        run: |
          node --version
          npm --version

      - name: Verify secrets are configured
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "错误: GEMINI_API_KEY 未在 GitHub Secrets 中配置"
            exit 1
          fi
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "错误: FEISHU_WEBHOOK 未在 GitHub Secrets 中配置"
            exit 1
          fi
          echo "Secrets 校验通过"

      - name: Run YouTube Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: node agent.js

      - name: Commit and push last_video.txt
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f last_video.txt ]; then
            echo "last_video.txt 不存在，跳过提交"
            exit 0
          fi

          if git diff --quiet HEAD -- last_video.txt; then
            echo "last_video.txt 无变化，跳过提交"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add last_video.txt
          git commit -m "chore: update last_video.txt"
          git push origin HEAD:${{ github.ref_name }}

          echo "last_video.txt 已提交并推送到远程仓库"

      - name: Log completion
        if: always()
        run: |
          echo "End time (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Job status: ${{ job.status }}"
